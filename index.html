<!DOCTYPE html><html lang='ar' dir='rtl'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>تسجيل الدخول</title><link rel='stylesheet' href='https://cdn.tailwindcss.com'><style>body { background-color: #020617; } .amber-500 { background-color: #ffc107; } .animate-input-focus { transition: all 0.2s ease-in-out; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); } .animate-button-hover { transition: all 0.2s ease-in-out; } .animate-fade-in-down { animation: fadeInDown 0.5s ease-in-out; } .animate-pulse { animation: pulse 2s infinite; } @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } } @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }</style></head><body class='h-screen flex justify-center items-center'><div class='bg-gray-800 p-10 rounded-lg shadow-2xl w-80 animate-fade-in-down'><h1 class='text-3xl text-white font-bold mb-4 animate-pulse'>تسجيل الدخول</h1><form><div class='mb-4'><label for='email' class='block text-white text-sm font-bold mb-2'>الإيميل</label><input id='email' type='email' class='shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline' placeholder='إدخل الإيميل'></div><div class='mb-4'><label for='password' class='block text-white text-sm font-bold mb-2'>كلمة المرور</label><input id='password' type='password' class='shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline' placeholder='إدخل كلمة المرور'></div><div class='mb-4'><label for='confirm-password' class='block text-white text-sm font-bold mb-2'>تأكيد كلمة المرور</label><input id='confirm-password' type='password' class='shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline' placeholder='إدخل تأكيد كلمة المرور'></div><button class='bg-amber-500 hover:bg-amber-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline animate-button-hover' type='submit'>تسجيل الدخول</button></form></div><script>const inputFields = document.querySelectorAll('input');inputFields.forEach((field) => { field.addEventListener('focus', () => { field.classList.add('animate-input-focus'); }); field.addEventListener('blur', () => { field.classList.remove('animate-input-focus'); }); });</script></body></html>
